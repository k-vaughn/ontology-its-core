site_name: ITS Ontology - Core
site_description: An site explaining core concepts within the overall set of ITS ontologies.
repo_url: https://github.com/ISO-TC204/ontology-its-core
nav:
- Home: index.md
- Classes:
  - Activation Status Code: classes/ActivationStatusCode.md
  - Angle: classes/Angle.md
  - Angle Unit: classes/AngleUnit.md
  - Bearing: classes/Bearing.md
  - Code: classes/Code.md
  - Code List: classes/CodeList.md
  - Direction: classes/Direction.md
  - Direction Code: classes/DirectionCode.md
- Properties:
  - codeValue: properties/codeValue.md
  - fromCodeList: properties/fromCodeList.md
  - hasActivationStatus: properties/hasActivationStatus.md
  - hasJurisdiction: properties/hasJurisdiction.md
  - hasMaintainer: properties/hasMaintainer.md
  - hasName: properties/hasName.md
  - hasRegisteredCode: properties/hasRegisteredCode.md
  - hasVersion: properties/hasVersion.md
  - ITSObjectProperty: properties/ITSObjectProperty.md
  - lastModified: properties/lastModified.md
  - managedBy: properties/managedBy.md
site_url: https://isotc204.org/ontology-its-core
copyright: <p xmlns:cc="http://creativecommons.org/ns#" xmlns:dct="http://purl.org/dc/terms/">
  <a href="https://creativecommons.org/licenses/by/4.0/?ref=chooser-v1" target="_blank"
  rel="license noopener noreferrer" style="display:inline-block;">CC BY 4.0<img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;"
  src="https://mirrors.creativecommons.org/presskit/icons/cc.svg?ref=chooser-v1" alt=""><img
  style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/by.svg?ref=chooser-v1"
  alt=""></a></p>
theme:
  name: material
  features:
  - content.code.copy
  - content.status
  - content.tooltips
  - icons
  - navigation.path
  - navigation.top
  icon:
    repo: fontawesome/brands/github
    admonition:
      question: fontawesome/solid/comments
  palette:
  - scheme: default
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
extra_css:
- stylesheets/extra.css
extra_javascript:
- https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
- javascripts/tablesort.js
plugins:
- search
- git-revision-date-localized:
    type: date
markdown_extensions:
- abbr
- admonition
- attr_list
- def_list
- md_in_html
- meta
- footnotes
- pymdownx.blocks.caption
- pymdownx.details
- pymdownx.highlight:
    anchor_linenums: true
    line_spans: __span
    pygments_lang_class: true
    use_pygments: true
- pymdownx.inlinehilite
- pymdownx.snippets:
    base_path: docs
    check_paths: true
- pymdownx.superfences:
    custom_fences:
    - name: mermaid
      class: mermaid
      format: ''
- pymdownx.tabbed:
    alternate_style: true
- toc:
    permalink: true
extra:
  search:
    highlight: true
  hide:
  - title
  version:
    provider: mike
    alias: true
    default: latest
